<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambiar Contraseña — Kislev</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/restricciones.css' %}">
    <style>
        body { font-family: Arial, sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 16px rgba(0,0,0,0.12); width: 100%; max-width: 420px; }
        h2 { margin-top: 0; color: #333; }
        .form-group { margin-bottom: 1.2rem; }
        label { display: block; margin-bottom: 4px; font-weight: 600; color: #555; font-size: 0.9rem; }
        input[type=password] { width: 100%; padding: 0.6rem 0.8rem; border: 1px solid #ccc; border-radius: 8px; font-size: 1rem; box-sizing: border-box; }
        button { width: 100%; padding: 0.75rem; background: #2563eb; color: white; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; }
        button:hover { background: #1d4ed8; }
        .msg-success { background: #d1fae5; color: #065f46; padding: 0.75rem; border-radius: 8px; margin-bottom: 1rem; }
        .msg-error   { background: #fee2e2; color: #991b1b; padding: 0.75rem; border-radius: 8px; margin-bottom: 1rem; }
        .back { display: block; text-align: center; margin-top: 1rem; color: #2563eb; text-decoration: none; font-size: 0.9rem; }
        ul { margin: 0; padding-left: 1.2rem; font-size: 0.85rem; color: #991b1b; }
    </style>
</head>
<body>
<div class="card">
    <h2>Cambiar Contraseña</h2>

    {% for message in messages %}
        <div class="msg-{{ message.tags }}">{{ message }}</div>
    {% endfor %}

    <form method="POST">
        {% csrf_token %}
        {% for field in form %}
        <div class="form-group">
            <label>{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}<ul>{% for e in field.errors %}<li>{{ e }}</li>{% endfor %}</ul>{% endif %}
        </div>
        {% endfor %}
        <button type="submit">Guardar nueva contraseña</button>
    </form>

    <a href="{% url 'kislevsmart:dashboard' %}" class="back">← Volver al dashboard</a>
</div>
</body>
</html>
