<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notificaciones de Servicios Públicos</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/restricciones.css' %}">
    <link rel="stylesheet" href="{% static 'css/noti_publicos.css' %}">

    <style>
        @keyframes resultFadeIn {
            from { opacity: 0; transform: translateY(16px) scale(0.96); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        .result-check {
            stroke-dasharray: 50;
            stroke-dashoffset: 50;
            animation: drawCheck 0.6s ease 0.2s forwards;
        }

        @keyframes drawCheck {
            to { stroke-dashoffset: 0; }
        }

        /* ── iOS fix ── */
        html, body { height: 100%; overflow: hidden; }
        .scroll-root { height: 100%; overflow-y: auto; -webkit-overflow-scrolling: touch; overscroll-behavior: none; }

        /* ── PAGE WRAP ── */
        .page-wrap { position: relative; z-index: 2; min-height: 100vh; padding: 32px 16px 40px; display: flex; align-items: center; justify-content: center; }

        /* ── MAIN CARD ── */
        .main-card {
            width: 100%; max-width: 760px;
            background: rgba(12,4,28,.7);
            border: 1px solid rgba(124,58,237,.2);
            border-radius: 28px; position: relative; overflow: hidden;
            animation: formSlideDown .52s cubic-bezier(.34,1.2,.64,1) both;
            box-shadow: 0 40px 100px rgba(0,0,0,.6), 0 0 80px rgba(124,58,237,.08), inset 0 0 0 1px rgba(255,255,255,.04);
        }
        @keyframes formSlideDown { from{opacity:0;transform:translateY(-50px) scale(.95)} to{opacity:1;transform:translateY(0) scale(1)} }
        @keyframes formSlideUp   { from{opacity:1;transform:translateY(0) scale(1)} to{opacity:0;transform:translateY(-60px) scale(.95)} }

        /* ── CARD HEADER (gradient) ── */
        .card-header {
            background: linear-gradient(135deg, #1a0336 0%, #2e0a5c 50%, #1a0336 100%);
            padding: 28px 24px 24px;
            display: flex; align-items: flex-start; justify-content: space-between;
            position: relative;
        }
        .card-header::after { content:''; position:absolute; bottom:0; left:0; right:0; height:1px; background: linear-gradient(90deg,transparent,rgba(167,139,250,.4),transparent); }
        .card-header-row { display: flex; align-items: center; gap: 16px; }
        .card-h-icon { width: 52px; height: 52px; border-radius: 16px; background: linear-gradient(135deg,#7c3aed,#db2777); display: flex; align-items: center; justify-content: center; font-size: 1.4rem; flex-shrink: 0; box-shadow: 0 8px 24px rgba(124,58,237,.5); }
        .card-h-brand { font-size: .7rem; font-weight: 700; color: rgba(167,139,250,.7); letter-spacing: .8px; text-transform: uppercase; margin-bottom: 3px; }
        .card-h-title { font-size: 1.18rem; font-weight: 800; color: #fff; }
        .card-h-sub { font-size: .74rem; color: rgba(196,181,253,.6); margin-top: 3px; }
        .card-close { width: 38px; height: 38px; border-radius: 10px; background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.12); color: rgba(255,255,255,.65); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .2s; flex-shrink: 0; font-family: inherit; }
        .card-close:hover { background: rgba(248,113,113,.18); border-color: rgba(248,113,113,.4); color: #fca5a5; transform: scale(1.05); }
        .card-close svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2.5; }

        /* ── CARD BODY ── */
        .card-body { padding: 28px 24px 32px; }

        /* ── CONFIRM MODAL ── */
        .modal-backdrop { position: fixed; inset: 0; z-index: 9990; display: none; align-items: center; justify-content: center; padding: 24px; background: rgba(4,2,14,.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .modal { background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.1); border-radius: 24px; padding: 36px 32px; text-align: center; max-width: 360px; width: 100%; }
        @keyframes modalAppear { from{opacity:0;transform:translateY(-20px) scale(.95)} to{opacity:1;transform:translateY(0) scale(1)} }
        .modal-content h2 { font-size: 1.1rem; font-weight: 800; color: #fff; margin-bottom: 8px; }
        .modal-confirm-icon { font-size: 2rem; margin-bottom: 16px; }
        .modal-confirm-sub { font-size: .84rem; color: rgba(255,255,255,.6); margin-bottom: 24px; line-height: 1.6; }
        .modal-buttons { display: flex; gap: 12px; }
        .btn-modal-no { flex: 1; padding: 12px; border-radius: 12px; background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.12); color: rgba(255,255,255,.8); font-family: inherit; font-size: .88rem; font-weight: 600; cursor: pointer; transition: background .2s; }
        .btn-modal-no:hover { background: rgba(255,255,255,.12); }
        .btn-modal-yes { flex: 1.4; padding: 12px; border-radius: 12px; background: linear-gradient(135deg,#7c3aed,#db2777); border: none; color: #fff; font-family: inherit; font-size: .88rem; font-weight: 700; cursor: pointer; box-shadow: 0 4px 16px rgba(124,58,237,.4); transition: transform .2s, box-shadow .2s; }
        .btn-modal-yes:hover { transform: translateY(-1px); box-shadow: 0 6px 22px rgba(124,58,237,.55); }

        @media(max-width:480px) {
            .page-wrap { padding: 16px 12px 32px; align-items: flex-start; }
            .card-header { padding: 22px 18px 20px; }
            .card-body { padding: 20px 16px 24px; }
        }
    </style>
</head>

    <!-- Modal de confirmación -->
    <div class="modal-backdrop" id="confirmModal">
        <div class="modal">
            <div class="modal-content">
                <div class="modal-confirm-icon">📡</div>
                <h2>¿Enviar notificación de <span id="serviceType"></span>?</h2>
                <p class="modal-confirm-sub">Todos los propietarios recibirán esta notificación directamente en su correo electrónico.</p>
                <div class="modal-buttons">
                    <button class="btn-modal-no" onclick="hideConfirmation()">Cancelar</button>
                    <button class="btn-modal-yes" onclick="sendNotification()">Sí, enviar</button>
                </div>
            </div>

    <script>
        window.CSRF_TOKEN = "{{ csrf_token }}";

        // ── Cerrar con animación slide-up ──
        {% if user.user_type == 'administrador' %}
        const PANEL_URL = "{% url 'accounts:visor_admin' %}";
        {% elif user.user_type == 'propietario' %}
        const PANEL_URL = "{% url 'accounts:visor_propietario' %}";
        {% elif user.user_type == 'porteria' %}
        const PANEL_URL = "{% url 'accounts:control_porteria' %}";
        {% else %}
        const PANEL_URL = "/";
        {% endif %}
        function closePage() {
            const card = document.getElementById('mainCard');
            if (card) card.style.animation = 'formSlideUp .38s cubic-bezier(.4,0,.8,.3) forwards';
            setTimeout(function() { window.location = PANEL_URL; }, 360);
        }

        // Variables globales
        let currentService = '';
        const ANIMATION_DURATION = 300;
        let progressModal = null;
        let currentProgress = 0;
        let isSubmitting = false;

        // Función mejorada para obtener el CSRF token
        function getCsrfToken() {
            // Primero intentar obtener el token de la variable global
            if (window.CSRF_TOKEN) {
                return window.CSRF_TOKEN;
            }

            // Si no está en la variable global, intentar obtenerlo del input hidden
            const csrfInput = document.querySelector('input[name="csrfmiddlewaretoken"]');
            if (csrfInput) {
                return csrfInput.value;
            }

            // Si aún no lo encontramos, buscarlo en las cookies
            return getCookie('csrftoken');
        }

        // Función para obtener cookies
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        // Función para inicializar efectos visuales
        function initializeVisualEffects() {
            // Crear efecto de desplazamiento aleatorio para los sobres
            const envelopes = document.querySelectorAll('.envelope');
            envelopes.forEach((envelope, index) => {
                const randomX = Math.random() * 20 - 10;
                const randomY = Math.random() * 20 - 10;
                const randomDelay = Math.random() * 2;
                const randomDuration = 2 + Math.random() * 2;

                envelope.style.transform = `translate(${randomX}px, ${randomY}px)`;
                envelope.style.transition = `all ${randomDuration}s ease-in-out`;
                envelope.style.animationDelay = `${randomDelay}s`;
            });

            // Efecto de aparición suave para las tarjetas
            const cards = document.querySelectorAll('.service-card');
            cards.forEach((card, index) => {
                card.style.opacity = '0';
                card.style.transform = 'translateY(20px)';
                setTimeout(() => {
                    card.style.transition = 'all 0.5s ease-in-out';
                    card.style.opacity = '1';
                    card.style.transform = 'translateY(0)';
                }, 100 * index);
            });
        }

        // Funciones para el modal de confirmación
        function showConfirmation(service) {
            const modal = document.getElementById('confirmModal');
            const serviceSpan = document.getElementById('serviceType');

            if (!modal || !serviceSpan) {
                console.error('Elementos del modal no encontrados');
                return;
            }

            currentService = service;
            serviceSpan.textContent = service;

            modal.style.display = 'flex';
            setTimeout(() => {
                modal.style.opacity = '1';
            }, 10);

            const modalContent = modal.querySelector('.modal');
            if (modalContent) {
                modalContent.classList.add('modal-enter');
            }
        }

        function hideConfirmation() {
            const modal = document.getElementById('confirmModal');
            const modalContent = modal.querySelector('.modal');

            modalContent.classList.remove('modal-enter');
            modalContent.classList.add('modal-leave');
            modal.style.opacity = '0';

            setTimeout(() => {
                modal.style.display = 'none';
                modalContent.classList.remove('modal-leave');
            }, ANIMATION_DURATION);
        }

        // Función actualizada para enviar notificación
        async function sendNotification() {
            if (isSubmitting) return;

            try {
                const button = document.querySelector(`.send-button[onclick*="${currentService}"]`);
                if (!button) {
                    console.error('Botón no encontrado');
                    return;
                }

                const csrfToken = getCsrfToken();
                if (!csrfToken) {
                    throw new Error('CSRF token no encontrado');
                }

                isSubmitting = true;
                button.disabled = true;
                showProgressModal();

                const response = await fetch('/api/send-service-notification/', {
                    method: 'POST',
                    credentials: 'same-origin',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': csrfToken,
                    },
                    body: JSON.stringify({
                        service_type: currentService
                    })
                });

                if (!response.ok) {
                    throw new Error(`Error HTTP: ${response.status}`);
                }

                const data = await response.json();
                hideConfirmation();

                if (data.status === 'success') {
                    updateProgress(data.successful_sends, data.total_processed);
                    setTimeout(() => {
                        showResultNotification(true, '', {
                            successful: data.successful_sends,
                            failed: data.failed_sends,
                            total: data.total_processed
                        });
                    }, 800);
                } else {
                    showResultNotification(false, data.message || 'Error al enviar las notificaciones', null);
                }

            } catch (error) {
                console.error('Error:', error);
                showResultNotification(false, `Error en el proceso de envío: ${error.message}`, null);
            } finally {
                const button = document.querySelector(`.send-button[onclick*="${currentService}"]`);
                if (button) {
                    button.disabled = false;
                    button.innerHTML = `
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                </svg>
                Enviar Notificación
            `;
                }
                setTimeout(() => {
                    isSubmitting = false;
                }, 2000);
            }
        }

        // Funciones de notificación
        function showSuccess(message) {
            const successDiv = document.createElement('div');
            successDiv.className = 'success-notification';
            successDiv.innerHTML = `
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 6L9 17l-5-5"/>
        </svg>
        <span>${message}</span>
    `;

            document.body.appendChild(successDiv);
            requestAnimationFrame(() => successDiv.classList.add('show'));

            setTimeout(() => {
                successDiv.classList.remove('show');
                setTimeout(() => successDiv.remove(), 300);
            }, 3000);
        }

        function showError(message) {
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error-notification';
            errorDiv.innerHTML = `
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
        </svg>
        <span>${message}</span>
    `;

            document.body.appendChild(errorDiv);
            requestAnimationFrame(() => errorDiv.classList.add('show'));

            setTimeout(() => {
                errorDiv.classList.remove('show');
                setTimeout(() => errorDiv.remove(), 300);
            }, 3000);
        }

        // Funciones del modal de progreso
        function showProgressModal() {
            if (progressModal) progressModal.remove();

            const modalHTML = `
        <div class="progress-modal" id="progressModal">
            <div class="progress-content" id="progressContent">
                <div class="sending-animation" id="sendingIcon">
                    <svg viewBox="0 0 24 24" width="64" height="64" fill="none" style="filter:drop-shadow(0 0 16px #a855f7)">
                        <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" stroke="url(#grad1)" stroke-width="2"/>
                        <defs>
                            <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#a855f7"/>
                                <stop offset="100%" style="stop-color:#ec4899"/>
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <h3 id="progressTitle">Enviando Notificaciones</h3>
                <div class="progress-status" id="progressStatus">
                    <p class="current-status" id="currentStatus">Preparando envío...</p>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <div class="progress-stats">
                        <div class="progress-stat">
                            <div class="progress-stat-value" id="sent-count">0</div>
                            <div class="progress-stat-label">Enviados</div>
                        </div>
                        <div class="progress-stat">
                            <div class="progress-stat-value" id="total-count">0</div>
                            <div class="progress-stat-label">Total</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>`;

            const wrapper = document.createElement('div');
            wrapper.innerHTML = modalHTML;
            document.body.appendChild(wrapper.firstElementChild);
            progressModal = document.getElementById('progressModal');
        }

        function updateProgress(sent, total) {
            if (!progressModal) return;
            const progress = (sent / total) * 100;
            const fill = document.getElementById('progressFill');
            const status = document.getElementById('currentStatus');
            const sentEl = document.getElementById('sent-count');
            const totalEl = document.getElementById('total-count');
            if (fill) fill.style.width = `${progress}%`;
            if (status) status.textContent = `Enviando ${sent} de ${total} notificaciones...`;
            if (sentEl) sentEl.textContent = sent;
            if (totalEl) totalEl.textContent = total;
        }

        function hideProgressModal() {
            if (progressModal && progressModal.parentElement) {
                progressModal.classList.add('fade-out');
                setTimeout(() => { progressModal.remove(); progressModal = null; }, 350);
            }
        }

        function showResultNotification(success, message, stats) {
            if (!progressModal) return;

            // Transformar el modal de progreso en pantalla de resultado
            const content = document.getElementById('progressContent');
            if (!content) return;

            const icon = success
                ? `<svg viewBox="0 0 52 52" width="72" height="72" style="filter:drop-shadow(0 0 18px #a855f7)">
                        <circle cx="26" cy="26" r="25" fill="none" stroke="url(#rg)" stroke-width="2"/>
                        <path class="result-check" d="M14 27l8 8 16-16" fill="none" stroke="url(#rg)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                        <defs>
                            <linearGradient id="rg" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#a855f7"/>
                                <stop offset="100%" style="stop-color:#ec4899"/>
                            </linearGradient>
                        </defs>
                   </svg>`
                : `<svg viewBox="0 0 52 52" width="72" height="72" style="filter:drop-shadow(0 0 18px #ec4899)">
                        <circle cx="26" cy="26" r="25" fill="none" stroke="#ec4899" stroke-width="2"/>
                        <path d="M16 16l20 20M36 16l-20 20" fill="none" stroke="#ec4899" stroke-width="3" stroke-linecap="round"/>
                   </svg>`;

            const statsHTML = stats
                ? `<div style="display:flex;gap:24px;justify-content:center;margin-top:12px">
                        <div style="text-align:center">
                            <div style="font-size:1.8rem;font-weight:700;background:linear-gradient(135deg,#a855f7,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent">${stats.successful}</div>
                            <div style="font-size:0.8rem;color:#9ca3af;margin-top:2px">Enviados</div>
                        </div>
                        ${stats.failed > 0 ? `<div style="text-align:center">
                            <div style="font-size:1.8rem;font-weight:700;color:#f87171">${stats.failed}</div>
                            <div style="font-size:0.8rem;color:#9ca3af;margin-top:2px">Fallidos</div>
                        </div>` : ''}
                        <div style="text-align:center">
                            <div style="font-size:1.8rem;font-weight:700;color:#e2e8f0">${stats.total}</div>
                            <div style="font-size:0.8rem;color:#9ca3af;margin-top:2px">Total</div>
                        </div>
                   </div>`
                : '';

            content.style.transition = 'opacity 0.3s ease';
            content.style.opacity = '0';

            setTimeout(() => {
                content.innerHTML = `
                    <div style="display:flex;flex-direction:column;align-items:center;gap:16px;animation:resultFadeIn 0.5s ease forwards">
                        ${icon}
                        <h3 style="font-size:1.3rem;font-weight:700;background:linear-gradient(135deg,#a855f7,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin:0">
                            ${success ? 'Notificaciones Enviadas' : 'Error en el Envío'}
                        </h3>
                        ${statsHTML}
                        <button onclick="cerrarResultado()" style="margin-top:8px;padding:10px 28px;border-radius:12px;border:none;background:linear-gradient(135deg,#a855f7,#ec4899);color:#fff;font-weight:600;font-size:0.95rem;cursor:pointer;transition:all 0.2s ease;box-shadow:0 4px 15px rgba(168,85,247,0.4)" onmouseover="this.style.transform='translateY(-2px)';this.style.boxShadow='0 6px 20px rgba(168,85,247,0.5)'" onmouseout="this.style.transform='none';this.style.boxShadow='0 4px 15px rgba(168,85,247,0.4)'">
                            Cerrar
                        </button>
                    </div>`;
                content.style.opacity = '1';
            }, 300);
        }

        function cerrarResultado() {
            if (progressModal) {
                progressModal.classList.add('fade-out');
                setTimeout(() => { progressModal.remove(); progressModal = null; }, 350);
            }
        }

        // Inicialización y event listeners
        document.addEventListener('DOMContentLoaded', () => {
            // Verificar que el CSRF token esté disponible
            const csrfToken = getCsrfToken();
            if (!csrfToken) {
                console.warn('CSRF token no encontrado. La funcionalidad puede estar limitada.');
            }

            // Inicializar botones
            const buttons = document.querySelectorAll('.send-button');
            buttons.forEach(button => {
                const service = button.closest('.service-card').querySelector('.service-name').textContent;
                button.setAttribute('data-service', service);
            });

            // Inicializar efectos visuales
            initializeVisualEffects();

            // Event listeners para el modal
            document.getElementById('confirmModal')?.addEventListener('click', (e) => {
                if (e.target.id === 'confirmModal') {
                    hideConfirmation();
                }
            });

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    hideConfirmation();
                }
            });

            // Hover effects para las tarjetas
            document.querySelectorAll('.service-card').forEach(card => {
                card.addEventListener('mousemove', (e) => {
                    const rect = card.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;

                    const centerX = rect.width / 2;
                    const centerY = rect.height / 2;

                    const rotateX = (y - centerY) / 20;
                    const rotateY = (centerX - x) / 20;

                    card.style.transform = `
                perspective(1000px)
                rotateX(${rotateX}deg)
                rotateY(${rotateY}deg)
                translateZ(10px)
            `;
                });

                card.addEventListener('mouseleave', () => {
                    card.style.transform = 'none';
                });
            });
        });

    </script>


</body>
